name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          buildozer -v android debug
        timeout-minutes: 60

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SmartFactory-APK
          path: bin/*.apk
          retention-days: 30

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: .buildozer/logs/
          retention-days: 7
